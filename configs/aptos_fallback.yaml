project:
  name: retina-subspace-audit
  seed: 42

dataset:
  name: aptos2019
  source: mariaherrerot/aptos2019
  image_root: data/raw/aptos2019/train_images
  label_csv: data/raw/aptos2019/train.csv
  image_id_column: id_code
  label_column: diagnosis
  patient_id_from_filename: false
  laterality_from_filename: false

preprocess:
  variant: resized
  image_size: 224

model:
  name: dinov2
  checkpoint: facebook/dinov2-base
  embedding_layer: cls
  batch_size: 64
  num_workers: 4
  mixed_precision: true

outputs:
  manifest_dir: outputs/manifests
  quality_dir: outputs/quality
  embedding_dir: outputs/embeddings
  direction_dir: outputs/directions
  table_dir: outputs/tables
  figure_dir: outputs/figures
